name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Check
        run: npm run check

      - name: Migration policy check
        run: npm run check:migrations

      - name: Build
        run: npm run build

      - name: API contract tests
        run: npm run test:api

      - name: API smoke
        run: npm run smoke:api

      - name: Release evidence check (optional gate)
        run: npm run check:release-evidence
